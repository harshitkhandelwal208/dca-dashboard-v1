name: Deploy Azure apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-app-service-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: dca-bot-rg
  BOT_APP_NAME: dca-bot-31464
  DASHBOARD_APP_NAME: dca-dashboard-31464
  NODE_VERSION: 22.x

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            bot/package-lock.json
            dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Build dashboard
        run: npm run build --prefix dashboard

      - name: Package bot
        run: |
          cd bot
          zip -r ../bot.zip . -x "node_modules/*" ".env" "data/*"

      - name: Package dashboard
        run: |
          cd dashboard
          zip -r ../dashboard.zip . -x "node_modules/*" ".env" ".vite/*"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: 2e531cfc-0fbb-4bf5-ac59-2c10e20d566a
          tenant-id: a1985a83-ae63-49ce-98c5-f07dfcb910b3
          subscription-id: 4aa2d76c-3207-4402-967b-83c9191c69a1

      - name: Configure startup commands
        run: |
          az webapp config set --resource-group "$RESOURCE_GROUP" --name "$BOT_APP_NAME" --startup-file "npm run start:runtime"
          az webapp config set --resource-group "$RESOURCE_GROUP" --name "$DASHBOARD_APP_NAME" --startup-file "npm start"

      - name: Deploy bot
        run: az webapp deploy --resource-group "$RESOURCE_GROUP" --name "$BOT_APP_NAME" --src-path bot.zip --type zip --clean true --track-status false

      - name: Deploy dashboard
        run: az webapp deploy --resource-group "$RESOURCE_GROUP" --name "$DASHBOARD_APP_NAME" --src-path dashboard.zip --type zip --clean true --track-status false

      - name: Verify live apps
        run: |
          curl --fail --connect-timeout 10 --max-time 30 --retry 12 --retry-delay 10 --retry-all-errors "https://$BOT_APP_NAME.azurewebsites.net/health"
          curl --fail --connect-timeout 10 --max-time 30 --retry 12 --retry-delay 10 --retry-all-errors "https://$DASHBOARD_APP_NAME.azurewebsites.net/dashboard/"
